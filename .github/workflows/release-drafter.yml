name: Release Drafter

on:
  workflow_call:
    inputs:
      event_name:
        description: "Pass github.event_name from the caller workflow"
        type: string
        required: true
      pr_draft:
        description: "Pass github.event.pull_request.draft from the caller workflow"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  autolabel:
    runs-on: ubuntu-latest
    if: inputs.event_name == 'pull_request' && inputs.pr_draft == false

    steps:
      - uses: release-drafter/release-drafter/autolabeler@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  draft:
    runs-on: ubuntu-latest
    if: inputs.event_name == 'push' || inputs.event_name == 'workflow_dispatch'

    concurrency:
      group: release-drafter-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          disable_autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}