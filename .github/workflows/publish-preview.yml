name: Publish Preview

on:
  workflow_call:
    inputs:
      solution:
        description: "Solution file name"
        required: true
        type: string
      dotnetVersion:
        description: ".NET SDK version(s)"
        required: true
        type: string
      prereleaseIdentifier:
        description: "Prerelease label used in the preview version (e.g. alpha, beta, preview)"
        required: false
        default: "preview"
        type: string
      hasTests:
        description: "Run tests before publish"
        required: false
        default: true
        type: boolean
      buildConfiguration:
        description: "Build configuration (e.g. 'Release EF10'). Defaults to 'Release'."
        required: false
        default: "Release"
        type: string
      drafterConfig:
        description: "Release Drafter config file name (e.g. release-drafter-ef10.yml)."
        required: false
        default: "release-drafter.yml"
        type: string
      nuget_api_key:
        description: "NuGet API key. OIDC callers pass this; non-OIDC callers rely on NUGET_API_KEY secret."
        required: false
        default: ""
        type: string
permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Resolve next version via Release Drafter
        id: release-drafter
        uses: release-drafter/release-drafter@v7
        with:
          config-name: ${{ inputs.drafterConfig }}
          dry-run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve preview version
        id: version
        shell: bash
        run: |
          resolved="${{ steps.release-drafter.outputs.resolved_version }}"
          if [[ -z "$resolved" ]]; then
            echo "::error::Release Drafter returned an empty resolved_version. Ensure .github/${{ inputs.drafterConfig }} is configured correctly."
            exit 1
          fi
          base="${resolved%%-*}"
          package_version="${base}-${{ inputs.prereleaseIdentifier }}.${{ github.run_number }}"
          printf 'package_version=%s\n' "$package_version" | tee -a "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Restore
        run: dotnet restore ${{ inputs.solution }} -p:Configuration="${{ inputs.buildConfiguration }}"

      - name: Build
        run: dotnet build ${{ inputs.solution }} --configuration "${{ inputs.buildConfiguration }}" --no-restore /p:Version=${{ steps.version.outputs.package_version }}

      - name: Test
        if: inputs.hasTests == true
        run: dotnet test --solution ${{ inputs.solution }} --configuration "${{ inputs.buildConfiguration }}" --no-build

      - name: Pack
        run: dotnet pack ${{ inputs.solution }} --configuration "${{ inputs.buildConfiguration }}" --no-build -o artifacts /p:Version=${{ steps.version.outputs.package_version }}

      - name: Publish to NuGet
        run: dotnet nuget push artifacts/**/*.nupkg -k "${{ inputs.nuget_api_key }}" -s https://api.nuget.org/v3/index.json --skip-duplicate
