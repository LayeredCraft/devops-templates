name: Publish Preview

on:
  workflow_call:
    inputs:
      solution:
        description: "Solution file name"
        required: true
        type: string
      dotnetVersion:
        description: ".NET SDK version(s)"
        required: true
        type: string
      hasTests:
        description: "Run tests before publish"
        required: false
        default: true
        type: boolean
    secrets:
      NUGET_API_KEY:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Resolve preview version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName 2>/dev/null || echo "v0.0.1")
          BASE="${LATEST_TAG#v}"
          echo "package_version=${BASE}.preview.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Restore
        run: dotnet restore ${{ inputs.solution }}

      - name: Build
        run: dotnet build ${{ inputs.solution }} --configuration Release --no-restore

      - name: Test
        if: inputs.hasTests == true
        run: dotnet test --solution ${{ inputs.solution }} --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ${{ inputs.solution }} --configuration Release --no-build -o artifacts /p:Version=${{ steps.version.outputs.package_version }}

      - name: Publish to NuGet
        run: dotnet nuget push artifacts/**/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate