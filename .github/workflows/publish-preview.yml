name: Publish Preview

on:
  workflow_call:
    inputs:
      solution:
        description: "Solution file name"
        required: true
        type: string
      dotnetVersion:
        description: ".NET SDK version(s)"
        required: true
        type: string
      prereleaseIdentifier:
        description: "Prerelease label used in the preview version (e.g. alpha, beta, preview)"
        required: false
        default: "preview"
        type: string
      hasTests:
        description: "Run tests before publish"
        required: false
        default: true
        type: boolean
    secrets:
      NUGET_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate release-drafter config exists
        run: |
          if [ ! -f ".github/release-drafter.yml" ]; then
            echo "❌ .github/release-drafter.yml not found."
            echo "   This file is required for preview version resolution."
            exit 1
          fi

      - name: Resolve next version via Release Drafter
        id: release-drafter
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          disable_autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve preview version
        id: version
        run: |
          RESOLVED="${{ steps.release-drafter.outputs.resolved_version }}"
          if [ -z "$RESOLVED" ]; then
            echo "❌ Release Drafter returned an empty resolved_version."
            echo "   Ensure .github/release-drafter.yml is configured correctly."
            exit 1
          fi
          BASE="${RESOLVED%%-*}"
          echo "package_version=${BASE}-${{ inputs.prereleaseIdentifier }}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnetVersion }}

      - name: Restore
        run: dotnet restore ${{ inputs.solution }}

      - name: Build
        run: dotnet build ${{ inputs.solution }} --configuration Release --no-restore /p:Version=${{ steps.version.outputs.package_version }} /p:InformationalVersion=${{ steps.version.outputs.package_version }}

      - name: Test
        if: inputs.hasTests == true
        run: dotnet test --solution ${{ inputs.solution }} --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ${{ inputs.solution }} --configuration Release --no-build -o artifacts /p:Version=${{ steps.version.outputs.package_version }} /p:InformationalVersion=${{ steps.version.outputs.package_version }}

      - name: Publish to NuGet
        run: dotnet nuget push artifacts/**/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
